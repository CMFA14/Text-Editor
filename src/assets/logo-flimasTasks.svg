<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="flimasTasksGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="60%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="flimasTasksBoard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <filter id="flimasTasksShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Sombra do board -->
  <rect x="14" y="22" width="92" height="80" rx="14" fill="rgba(29,78,216,0.12)" filter="url(#flimasTasksShadow)" transform="translate(2,3)"/>
  <!-- Board principal -->
  <rect x="14" y="22" width="92" height="80" rx="14" fill="url(#flimasTasksBoard)" stroke="rgba(29,78,216,0.18)" stroke-width="1"/>
  <!-- Faixa superior -->
  <rect x="14" y="22" width="92" height="14" rx="14" fill="url(#flimasTasksGrad)"/>
  <rect x="14" y="32" width="92" height="6" fill="url(#flimasTasksGrad)"/>

  <!-- Coluna 1 (A fazer) -->
  <rect x="22" y="44" width="22" height="50" rx="4" fill="#fbbf24" opacity="0.18"/>
  <rect x="24" y="48" width="18" height="6" rx="2" fill="#f59e0b"/>
  <rect x="24" y="58" width="18" height="6" rx="2" fill="#fbbf24" opacity="0.6"/>
  <rect x="24" y="68" width="18" height="6" rx="2" fill="#fbbf24" opacity="0.4"/>

  <!-- Coluna 2 (Em progresso) -->
  <rect x="49" y="44" width="22" height="50" rx="4" fill="#3b82f6" opacity="0.18"/>
  <rect x="51" y="48" width="18" height="6" rx="2" fill="#3b82f6"/>
  <rect x="51" y="58" width="18" height="6" rx="2" fill="#3b82f6" opacity="0.6"/>

  <!-- Coluna 3 (Concluído) -->
  <rect x="76" y="44" width="22" height="50" rx="4" fill="#10b981" opacity="0.18"/>
  <rect x="78" y="48" width="18" height="6" rx="2" fill="#10b981"/>
  <!-- Marca de check pequena -->
  <path d="M81 51.2 L83 53 L87 49" stroke="#ffffff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
